{{define "base"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/static/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#16274f">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>🔭 clearsky</h1>
    <p class="sub">Nightly astrophotography go/no-go — Donvale, VIC</p>
    <form method="post" action="/run" class="run">
      <button type="submit">Run tonight's check now</button>
    </form>
  </header>
  <main>
    {{template "content" .}}
  </main>
  <footer>
    <p>Images published at <a href="https://deepspaceplace.com/images" target="_blank" rel="noopener">deepspaceplace.com/images</a></p>
  </footer>
</body>
</html>{{end}}
